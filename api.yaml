        required: [expected_revision]
    response:
      status: 200
      schema:
        type: object
        additionalProperties: false
        properties: {item: *item_summary}
        required: [item]
    execution: {mode: sync, timeout_seconds: 120, transactional: true}
    idempotency: {required: true, header: Idempotency-Key, ttl_seconds: 86400}
    rate_limit: {max_attempts: 20, decay_seconds: 60}
    audit: {event: content.item_admin.revisions.restore, summary_fields: [path.item_ref, path.revision, body.expected_revision]}
    lifecycle: {state: draft, version: v1}
    docs: {summary: Restore Content revision, description: Restores historical values through the current schema as a new draft., tags: [Content]}

