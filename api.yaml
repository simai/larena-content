  - key: content.item_admin.attachments.list
    method: GET
    path: /api/v1/admin/content/items/{item_ref}/attachments
    handler: {operation_ref: content.item_admin.attachments.list}
    auth: {channels: [admin_session]}
    csrf: {required: false}
    access: {operations: [content.attachment.list]}
    request: {path: *item_path, query: {type: object, additionalProperties: false, properties: {}, required: []}, body: {type: object, additionalProperties: false, properties: {}, required: []}}
    response:
      status: 200
      schema:
        type: object
        additionalProperties: false
        properties:
          item_ref: *item_ref
          revision: {type: integer, minimum: 1}
          items:
            type: array
            items: &attachment
              type: object
              additionalProperties: false
              properties:
                logical_file_ref: &logical_file_ref
                  {type: string, minLength: 36, maxLength: 36, pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'}
                role: &attachment_role {type: string, minLength: 1, maxLength: 64, pattern: '^[a-z][a-z0-9._-]*$'}
                position: &attachment_position {type: integer, minimum: 0, maximum: 99}
              required: [logical_file_ref, role, position]
        required: [item_ref, revision, items]
    execution: {mode: sync, timeout_seconds: 30, transactional: false}
    idempotency: {required: false, header: Idempotency-Key, ttl_seconds: 86400}
    rate_limit: {max_attempts: 60, decay_seconds: 60}
    audit: {event: content.item_admin.attachments.list, summary_fields: [path.item_ref]}
    lifecycle: {state: draft, version: v1}
    docs: {summary: List Content attachments, description: Returns the exact current ordered attachment manifest., tags: [Content]}

